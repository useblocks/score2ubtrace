name: Nightly ubTrace publish

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Single ref to publish (overrides the nightly matrix). Default main.'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: nightly-ubtrace
  cancel-in-progress: false

env:
  SCORE_REPO: eclipse-score/score
  TAG_MIN: v0.5.5
  UBTRACE_URL: https://api.team.useblocks.com/api
  UBTRACE_ORG: eclipse-score
  UBTRACE_PROJECT: score

jobs:
  list-refs:
    runs-on: ubuntu-latest
    outputs:
      refs: ${{ steps.compute.outputs.refs }}
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v6

      - name: Compute ref matrix
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dispatch_ref=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            dispatch_ref="${{ github.event.inputs.ref }}"
          fi
          refs="$(./scripts/list-refs.sh "${dispatch_ref}")"
          echo "refs=${refs}" >> "${GITHUB_OUTPUT}"
          echo "Matrix: ${refs}"

  build-and-publish:
    needs: list-refs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref: ${{ fromJSON(needs.list-refs.outputs.refs) }}
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v6
        with:
          path: orchestrator

      - name: Checkout score@${{ matrix.ref }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SCORE_REPO }}
          ref: ${{ matrix.ref }}
          path: score

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Bazel ide_support (materializes .venv_docs/site-packages and runfiles)
        working-directory: score
        run: bazel run //:ide_support

      - name: Install ubt-sphinx into an overlay (resolves via pypi.useblocks.com)
        run: |
          # Use system python3.12 (not the Bazel-wrapped one) so uv can probe
          # the interpreter cleanly. --target installs into a flat directory
          # the build step picks up via PYTHONPATH.
          uv pip install \
            --python python3.12 \
            --target ubt-overlay \
            --index-url https://pypi.org/simple \
            --extra-index-url https://pypi.useblocks.com/ \
            --index-strategy unsafe-best-match \
            ubt-sphinx

      - name: Apply score conf.py patch
        run: git -C score apply --3way ../orchestrator/patches/score-main-conf.py.patch

      - name: Build ubTrace artifact
        working-directory: score
        env:
          # bazel ide_support populates .venv_docs/lib/python3.12/site-packages
          # with all docs-as-code extensions + transitive deps. ubt-overlay
          # adds ubt-sphinx and the deps it pulled in. We invoke system
          # python3.12 directly (not the Bazel-wrapped launcher in
          # .venv_docs/bin/python, which needs runfiles env to bootstrap)
          # and stitch the two trees via PYTHONPATH.
          PYTHONPATH: ${{ github.workspace }}/score/.venv_docs/lib/python3.12/site-packages:${{ github.workspace }}/ubt-overlay
          # score's score_source_code_linker extension only generates its
          # score_source_code_linker_cache.json when it can find the workspace
          # root via BUILD_WORKSPACE_DIRECTORY (normally set by `bazel run`).
          # Since we invoke Sphinx directly (not through Bazel), we point it at
          # the score checkout so the extension scans sources and writes the
          # cache; otherwise its env-updated handler crashes on the missing file.
          BUILD_WORKSPACE_DIRECTORY: ${{ github.workspace }}/score
        run: |
          python3.12 -m sphinx -b ubtrace \
            -D ubtrace_version="${{ matrix.ref }}" \
            -D score_source_code_linker_plain_links=1 \
            docs docs/_build/ubtrace

      - name: Upload to ubTrace
        env:
          UBTRACE_INGEST_TOKEN: ${{ secrets.UBTRACE_INGEST_TOKEN }}
          UBTRACE_VERSION: ${{ matrix.ref }}
          BUILD_DIR: score/docs/_build/ubtrace/${{ env.UBTRACE_ORG }}/${{ env.UBTRACE_PROJECT }}/${{ matrix.ref }}
        run: bash orchestrator/upload.sh
