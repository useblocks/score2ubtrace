name: Nightly ubTrace publish

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Single ref to publish (overrides the nightly matrix). Default main.'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: nightly-ubtrace
  cancel-in-progress: false

env:
  SCORE_REPO: eclipse-score/score
  DAC_REPO: eclipse-score/docs-as-code
  DAC_REF: v4.0.3
  TAG_MIN: v0.5.5
  PLANTUML_VERSION: '1.2025.0'
  UBTRACE_URL: https://api.team.useblocks.com/api
  UBTRACE_ORG: eclipse-score
  UBTRACE_PROJECT: score

jobs:
  list-refs:
    runs-on: ubuntu-latest
    outputs:
      refs: ${{ steps.compute.outputs.refs }}
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v6

      - name: Compute ref matrix
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dispatch_ref=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            dispatch_ref="${{ github.event.inputs.ref }}"
          fi
          refs="$(./scripts/list-refs.sh "${dispatch_ref}")"
          echo "refs=${refs}" >> "${GITHUB_OUTPUT}"
          echo "Matrix: ${refs}"

  build-and-publish:
    needs: list-refs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref: ${{ fromJSON(needs.list-refs.outputs.refs) }}
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v6
        with:
          path: orchestrator

      - name: Checkout score@${{ matrix.ref }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SCORE_REPO }}
          ref: ${{ matrix.ref }}
          path: score

      - name: Checkout docs-as-code@${{ env.DAC_REF }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.DAC_REPO }}
          ref: ${{ env.DAC_REF }}
          path: docs-as-code

      - name: Install Graphviz + JRE + PlantUML
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get --yes install graphviz default-jre-headless
          sudo curl --fail --silent --show-error --location \
            --output /usr/local/bin/plantuml.jar \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"
          printf '#!/bin/sh\nexec java -jar /usr/local/bin/plantuml.jar "$@"\n' \
            | sudo tee /usr/local/bin/plantuml > /dev/null
          sudo chmod +x /usr/local/bin/plantuml
          plantuml -version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply score conf.py patch
        run: git -C score apply --3way ../orchestrator/patches/score-main-conf.py.patch

      - name: Sync uv venv
        working-directory: orchestrator
        run: uv sync

      - name: Build ubTrace artifact
        working-directory: score
        env:
          # PYTHONPATH layers (lowest priority first):
          # - orchestrator/shims: provides a `python.runfiles` shim that
          #   re-exports the PyPI `bazel-runfiles` package under the Bazel
          #   `@rules_python//python/runfiles` namespace docs-as-code uses.
          # - docs-as-code: so `from src.helper_lib import ...` resolves
          #   (docs-as-code/src/__init__.py exists; `src` is the package).
          # - docs-as-code/src/extensions: so score's conf.py can import
          #   `score_sphinx_bundle` by its bare name.
          PYTHONPATH: ${{ github.workspace }}/orchestrator/shims:${{ github.workspace }}/docs-as-code:${{ github.workspace }}/docs-as-code/src/extensions
        run: |
          # Run from inside score/ so docs-as-code's find_git_root() walks up
          # from cwd and lands on score's own .git directory.
          source ../orchestrator/.venv/bin/activate
          sphinx-build -W -b ubtrace \
            -D ubtrace_version="${{ matrix.ref }}" \
            docs docs/_build/ubtrace

      - name: Upload to ubTrace
        env:
          UBTRACE_INGEST_TOKEN: ${{ secrets.UBTRACE_INGEST_TOKEN }}
          UBTRACE_VERSION: ${{ matrix.ref }}
          BUILD_DIR: score/docs/_build/ubtrace/${{ env.UBTRACE_ORG }}/${{ env.UBTRACE_PROJECT }}/${{ matrix.ref }}
        run: bash orchestrator/upload.sh
