name: Nightly ubTrace publish

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Single ref to publish (overrides the nightly matrix). Default main.'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: nightly-ubtrace
  cancel-in-progress: false

env:
  SCORE_REPO: eclipse-score/score
  TAG_MIN: v0.5.5
  UBTRACE_URL: https://api.team.useblocks.com/api
  UBTRACE_ORG: eclipse-score
  UBTRACE_PROJECT: score

jobs:
  list-refs:
    runs-on: ubuntu-latest
    outputs:
      refs: ${{ steps.compute.outputs.refs }}
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v6

      - name: Compute ref matrix
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dispatch_ref=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            dispatch_ref="${{ github.event.inputs.ref }}"
          fi
          refs="$(./scripts/list-refs.sh "${dispatch_ref}")"
          echo "refs=${refs}" >> "${GITHUB_OUTPUT}"
          echo "Matrix: ${refs}"

  build-and-publish:
    needs: list-refs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref: ${{ fromJSON(needs.list-refs.outputs.refs) }}
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v6
        with:
          path: orchestrator

      - name: Checkout score@${{ matrix.ref }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SCORE_REPO }}
          ref: ${{ matrix.ref }}
          path: score

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Bazel ide_support (materializes .venv_docs and runfiles)
        working-directory: score
        run: bazel run //:ide_support

      - name: Inspect .venv_docs layout
        working-directory: score
        run: |
          echo "--- .venv_docs (top) ---"
          ls -la .venv_docs/ || true
          echo "--- .venv_docs/bin ---"
          ls -la .venv_docs/bin/ 2>/dev/null || echo "(no bin/)"
          echo "--- python resolution ---"
          readlink -f .venv_docs 2>&1 || true
          readlink -f .venv_docs/bin/python 2>&1 || echo "(no python symlink)"
          which python3 && python3 --version

      - name: Layer ubt-sphinx into the Bazel-managed venv
        working-directory: score
        run: |
          uv pip install \
            --python .venv_docs \
            --index-url https://pypi.org/simple \
            --extra-index-url https://pypi.useblocks.com/ \
            --index-strategy unsafe-best-match \
            ubt-sphinx

      - name: Apply score conf.py patch
        run: git -C score apply --3way ../orchestrator/patches/score-main-conf.py.patch

      - name: Build ubTrace artifact
        working-directory: score
        run: |
          source .venv_docs/bin/activate
          sphinx-build -W -b ubtrace \
            -D ubtrace_version="${{ matrix.ref }}" \
            docs docs/_build/ubtrace

      - name: Upload to ubTrace
        env:
          UBTRACE_INGEST_TOKEN: ${{ secrets.UBTRACE_INGEST_TOKEN }}
          UBTRACE_VERSION: ${{ matrix.ref }}
          BUILD_DIR: score/docs/_build/ubtrace/${{ env.UBTRACE_ORG }}/${{ env.UBTRACE_PROJECT }}/${{ matrix.ref }}
        run: bash orchestrator/upload.sh
